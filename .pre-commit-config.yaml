repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
      
  - repo: https://github.com/crate-ci/typos
    rev: v1.47.0
    hooks:
      - id: typos
  - repo: local
    hooks:
      - id: ty
        name: ty type checker
        entry: ty check
        language: system
        pass_filenames: false
        types: [python]
        args: [fenn/, --exit-zero]
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.4.2
    hooks:
      - id: commitizen
        stages: [commit-msg]